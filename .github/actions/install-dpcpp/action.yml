name: install-dpcpp
description: Install DPC++ from nightly source build or packaged releases
inputs:
  DPCPP_RELEASE:
    description: "Use RELEASE or NIGHTLY DPC++ release"
    type: string
    default: NIGHTLY
  DPCPP_VERSION:
    description: "DPC++ version to use"
    type: string
  DPCPP_PATH:
    description: Path to DPC++
    type: string
    default: ~/dpcpp
  GPU:
    description: "Install for PVC or BMG gpu"
    type: string
  IGC:
    description: "Use ROLLING or STAGING release"
    type: string

runs:
  using: "composite"
  steps:
    - name: Install DPCPP
      if: inputs.DPCPP_RELEASE == 'NIGHTLY'
      shell: bash
      run: |
        shopt -s expand_aliases
        which sudo || alias sudo=""

        # Ensure Python is available for intel/llvm buildbot scripts.
        if command -v python3 >/dev/null 2>&1; then
          PYTHON_BIN=python3
        elif command -v python >/dev/null 2>&1; then
          PYTHON_BIN=python
        else
          sudo apt update
          sudo apt install -y python3
          PYTHON_BIN=python3
        fi

        export DPCPP_PATH=${{ inputs.DPCPP_PATH }}
        mkdir -p "$DPCPP_PATH"
        pushd "$DPCPP_PATH"

        # Build from sources following intel/llvm SYCL GetStartedGuide:
        # python <workspace>/llvm/buildbot/configure.py
        # python <workspace>/llvm/buildbot/compile.py
        if [[ -d llvm ]]; then
          rm -rf llvm
        fi

        git clone --depth=1 https://github.com/intel/llvm -b sycl llvm
        pushd llvm

        if [[ "${{ inputs.DPCPP_VERSION }}" != "" ]]; then
          echo "Will build DPCPP from intel/llvm ref: ${{ inputs.DPCPP_VERSION }}"
          git fetch --depth=1 origin "${{ inputs.DPCPP_VERSION }}" || true
          git checkout "${{ inputs.DPCPP_VERSION }}"
        else
          echo "Will build latest nightly DPCPP from intel/llvm"
          # Use grep and sed instead of jq to avoid additional dependencies.
          latest=$(curl -sS https://api.github.com/repos/intel/llvm/releases | \
            grep '"tag_name":' | \
            grep 'nightly-[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' | \
            head -1 | \
            sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')

          if [[ -z "$latest" ]]; then
            echo "Unable to detect latest nightly tag from intel/llvm releases"
            exit 1
          fi

          echo "Resolved nightly tag: ${latest}"
          git fetch --depth=1 origin "${latest}" || true
          git checkout "${latest}"
        fi

        "$PYTHON_BIN" buildbot/configure.py -t Release -o build
        "$PYTHON_BIN" buildbot/compile.py -o build

        popd
        popd

        cat <<EOF | tee setvars.sh
        export PATH=$DPCPP_PATH/llvm/build/bin:$PATH
        export LD_LIBRARY_PATH=$DPCPP_PATH/llvm/build/lib:$LD_LIBRARY_PATH
        export C_INCLUDE_PATH=$DPCPP_PATH/llvm/build/include:$C_INCLUDE_PATH
        export CPLUS_INCLUDE_PATH=$DPCPP_PATH/llvm/build/include:$CPLUS_INCLUDE_PATH
        export CC=$DPCPP_PATH/llvm/build/bin/clang
        export CXX=$DPCPP_PATH/llvm/build/bin/clang++
        EOF
    - name: Install DPCPP
      if: inputs.DPCPP_RELEASE == 'RELEASE'
      shell: bash
      run: |
        shopt -s expand_aliases
        which sudo || alias sudo=""
        wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | \
          gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | \
          sudo tee /etc/apt/sources.list.d/oneAPI.list
        sudo apt update
        sudo apt install -y intel-oneapi-runtime-libs intel-oneapi-compiler-dpcpp-cpp
        . /opt/intel/oneapi/setvars.sh
        cat <<EOF | tee setvars.sh
        . /opt/intel/oneapi/setvars.sh
        export CC=icx
        export CXX=icpx
        export C_INCLUDE_PATH=$CMPLR_ROOT/include:$C_INCLUDE_PATH
        export CPLUS_INCLUDE_PATH=$CMPLR_ROOT/include:$CPLUS_INCLUDE_PATH
        export LD_LIBRARY_PATH=$CMPLR_ROOT/lib:$LD_LIBRARY_PATH
        EOF

    - name: Install DPCPP
      if: inputs.DPCPP_RELEASE == 'TORCH_SUPPORTED'
      shell: bash
      run: |
        if [ -d /home/ghrunner/intel/oneapi/compiler ]; then
          echo "DPC++ compiler already installed at /home/ghrunner/intel/oneapi/compiler"
        else
          echo "Installing DPC++ compiler..."
          sudo wget https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b3e6c1bf-a6d5-4580-8b1d-80cbfd38c8af/intel-deep-learning-essentials-2025.3.2.36_offline.sh
          bash intel-deep-learning-essentials-2025.3.2.36_offline.sh -a --silent --eula accept --components intel.oneapi.lin.dpcpp-cpp-compiler
        fi
        . /home/ghrunner/intel/oneapi/setvars.sh
        cat > setvars.sh <<EOF
        . /home/ghrunner/intel/oneapi/setvars.sh
        export CC=icx
        export CXX=icpx
        export C_INCLUDE_PATH=$CMPLR_ROOT/include:$C_INCLUDE_PATH
        export CPLUS_INCLUDE_PATH=$CMPLR_ROOT/include:$CPLUS_INCLUDE_PATH
        export LD_LIBRARY_PATH=$CMPLR_ROOT/lib:$LD_LIBRARY_PATH
        EOF


