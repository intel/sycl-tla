name: "Reusable Intel Test Workflow"

on:
  workflow_call:
    inputs:
      compiler:
        description: 'Compiler version'
        required: true
        type: string  
      intel_graphics:
        description: 'Intel graphics driver version'
        required: true
        type: string
      gpu:
        description: 'GPU type (PVC, BMG)'
        required: true
        type: string
      DPCPP_VERSION:
        description: 'DPC++ version'
        required: false
        type: string
      DPCPP_PATH:
        description: 'DPC++ path'
        required: false
        type: string
      CACHE_ENABLED:
        description: 'Enable compiler cache for PR jobs'
        required: false
        type: boolean
        default: false

jobs:
  run-tests:
    strategy:
      matrix:
        compiler: ${{ fromJSON(inputs.compiler) }}
        intel_graphics: ${{ fromJSON(inputs.intel_graphics) }}
        gpu: ${{ fromJSON(inputs.gpu) }}
          
    name: Run Intel ${{ matrix.compiler }} tests on ${{ matrix.gpu }} with intel-graphics ${{ matrix.intel_graphics }}
    runs-on: ${{ matrix.gpu == 'BMG' && 'bmg' || 'pvc' }}
    timeout-minutes: 120

    steps:
      - name: Set GPU config
        shell: bash
        run: |
          if [ "${{ matrix.gpu }}" = "BMG" ]; then
            echo "SYCL_TARGET=intel_gpu_bmg_g21" >> $GITHUB_ENV
            echo "IGC_VERSION_MAJOR=2" >> $GITHUB_ENV
            echo "IGC_VERSION_MINOR=18" >> $GITHUB_ENV
          else
            echo "SYCL_TARGET=intel_gpu_pvc" >> $GITHUB_ENV
            echo "IGC_VERSION_MAJOR=2" >> $GITHUB_ENV
            echo "IGC_VERSION_MINOR=11" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Install Intel graphics drivers
        uses: ./.github/actions/install-intel-graphics
        with:
          GPU: ${{ matrix.gpu }}
          IGC: ${{ matrix.intel_graphics }}
      
      - name: Install DPC++
        uses: ./.github/actions/install-dpcpp
        with:
          DPCPP_RELEASE: ${{ matrix.compiler }}
          DPCPP_VERSION: ${{ inputs.DPCPP_VERSION }}
          GPU: ${{ matrix.gpu }}
          IGC: ${{ matrix.intel_graphics }}
      
      - name: Setup virtual environment
        shell: bash
        run: |
          if ! command -v cmake &> /dev/null || ! command -v ninja &> /dev/null || ! command -v ccache &> /dev/null; then
            echo "Installing cmake, ninja, and/or ccache..."
            sudo apt update
            sudo apt install -y cmake ninja-build ccache
          else
            echo "cmake, ninja, and ccache already available"
          fi
          . setvars.sh
          export IGC_ExtraOCLOptions="-cl-intel-256-GRF-per-thread"
          export SYCL_PROGRAM_COMPILE_OPTIONS="-ze-opt-large-register-file -gline-tables-only"
          export ONEAPI_DEVICE_SELECTOR=level_zero:gpu
          export IGC_VectorAliasBBThreshold=100000000000
          export CCACHE_DIR="$HOME/.cache/ccache"
          export CCACHE_BASEDIR="$GITHUB_WORKSPACE"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_MAXSIZE=2G
          env >> $GITHUB_ENV
          which $CXX
          $CXX --version
          sycl-ls

      - name: Capture cache fingerprint
        id: cache_fingerprint
        if: inputs.CACHE_ENABLED
        shell: bash
        run: |
          DPCPP_VERSION_DETECTED=$($CXX --version | sed -n 's/^Intel(R) oneAPI DPC++\/C++ Compiler \([0-9.]*\).*/\1/p' | head -1)
          if [ -z "$DPCPP_VERSION_DETECTED" ]; then
            DPCPP_VERSION_DETECTED=$($CXX --version | sed -n 's/.*clang version \([^ )]*\).*/\1/p' | head -1)
          fi
          if [ -z "$DPCPP_VERSION_DETECTED" ]; then
            DPCPP_VERSION_DETECTED="unknown"
          fi

          GRAPHICS_RUNTIME_VERSION=$(sycl-ls --ignore-device-selectors 2>/dev/null | sed -n 's/.*Graphics \([^ ]*\) \[.*/\1/p' | head -1)
          if [ -z "$GRAPHICS_RUNTIME_VERSION" ]; then
            GRAPHICS_RUNTIME_VERSION=$(sycl-ls 2>/dev/null | sed -n 's/.*Graphics \([^ ]*\) \[.*/\1/p' | head -1)
          fi
          if [ -z "$GRAPHICS_RUNTIME_VERSION" ]; then
            GRAPHICS_RUNTIME_VERSION="unknown"
          fi

          IGC_PACKAGE_VERSION=$(dpkg-query -W -f='${Version}' libigc2 2>/dev/null || true)
          ZE_PACKAGE_VERSION=$(dpkg-query -W -f='${Version}' libze-intel-gpu1 2>/dev/null || true)
          if [ -z "$IGC_PACKAGE_VERSION" ]; then
            IGC_PACKAGE_VERSION="unknown"
          fi
          if [ -z "$ZE_PACKAGE_VERSION" ]; then
            ZE_PACKAGE_VERSION="unknown"
          fi

          echo "dpcpp=$DPCPP_VERSION_DETECTED" >> $GITHUB_OUTPUT
          echo "gfx_rt=$GRAPHICS_RUNTIME_VERSION" >> $GITHUB_OUTPUT
          echo "igc=$IGC_PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "ze=$ZE_PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "Detected cache fingerprint: dpcpp=$DPCPP_VERSION_DETECTED, gfx_rt=$GRAPHICS_RUNTIME_VERSION, igc=$IGC_PACKAGE_VERSION, ze=$ZE_PACKAGE_VERSION"

      - name: Restore ccache
        if: inputs.CACHE_ENABLED
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-intel-test-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.gpu }}-${{ matrix.intel_graphics }}-${{ steps.cache_fingerprint.outputs.dpcpp }}-${{ steps.cache_fingerprint.outputs.gfx_rt }}-${{ steps.cache_fingerprint.outputs.igc }}-${{ steps.cache_fingerprint.outputs.ze }}-${{ hashFiles('CMakeLists.txt', 'SYCL.cmake', 'include/**', 'test/**', 'examples/**') }}
          restore-keys: |
            ccache-intel-test-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.gpu }}-${{ matrix.intel_graphics }}-${{ steps.cache_fingerprint.outputs.dpcpp }}-${{ steps.cache_fingerprint.outputs.gfx_rt }}-${{ steps.cache_fingerprint.outputs.igc }}-${{ steps.cache_fingerprint.outputs.ze }}-
            ccache-intel-test-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.gpu }}-${{ matrix.intel_graphics }}-
      
      - name: Build
        shell: bash
        run: |
          if [ "${{ inputs.CACHE_ENABLED }}" = "true" ]; then
            ccache --zero-stats || true
          fi
          cmake -G Ninja  \
            -DCUTLASS_ENABLE_SYCL=ON \
            -DDPCPP_SYCL_TARGET=${{ env.SYCL_TARGET }} \
            -DIGC_VERSION_MAJOR=${{ env.IGC_VERSION_MAJOR }} \
            -DIGC_VERSION_MINOR=${{ env.IGC_VERSION_MINOR }} \
            -DCMAKE_CXX_FLAGS="-Werror" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCUTLASS_SYCL_RUNNING_CI=ON
          cmake --build . 

      - name: Show ccache stats
        if: inputs.CACHE_ENABLED
        shell: bash
        run: ccache --show-stats || true
      
      - name: Unit test
        shell: bash
        run: |
          cmake --build . --target test_unit -j 8
      
      - name: Examples
        shell: bash
        run: |
          cmake --build . --target test_examples -j 1

      - name: Inspect ccache directory
        if: always() && inputs.CACHE_ENABLED
        shell: bash
        run: |
          echo "CCACHE_DIR=${CCACHE_DIR:-$HOME/.cache/ccache}"
          if [ -d "${CCACHE_DIR:-$HOME/.cache/ccache}" ]; then
            du -sh "${CCACHE_DIR:-$HOME/.cache/ccache}" || true
            find "${CCACHE_DIR:-$HOME/.cache/ccache}" -maxdepth 2 -type f | sort | head -100 || true
          else
            echo "ccache directory does not exist"
          fi
          ccache --show-stats || true
      
      - name: Cleanup DPC++
        if: always()
        shell: bash
        run: |
          echo "Cleaning up DPC++ installation..."
          DPCPP_PATH="${{ inputs.DPCPP_PATH || '~/dpcpp' }}"
          DPCPP_PATH=$(eval echo $DPCPP_PATH)
          if [ -d "$DPCPP_PATH" ]; then
            echo "Removing DPCPP directory: $DPCPP_PATH"
            sudo rm -rf "$DPCPP_PATH"
          fi
          if [[ "${{ matrix.compiler }}" == "RELEASE" ]]; then
            echo "Removing OneAPI packages..."
            sudo apt remove -y intel-oneapi-runtime-libs intel-oneapi-compiler-dpcpp-cpp || true
            sudo rm -f /etc/apt/sources.list.d/oneAPI.list
            sudo rm -f /usr/share/keyrings/oneapi-archive-keyring.gpg
          fi
          rm -f setvars.sh
          rm -rf build/ || true
          echo "DPC++ cleanup completed"
